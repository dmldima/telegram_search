name: Telegram Channel Monitor

on:
  schedule:
    # Запуск каждый день в 9:00 UTC (12:00 МСК, 11:00 по Киеву/Минску)
    - cron: '0 9 * * *'
  
  # Возможность запустить вручную
  workflow_dispatch:

# Добавляем права на запись
permissions:
  contents: write

# Не допускаем параллельных прогонов (расписание + ручной запуск),
# иначе гонка git push и потеря/конфликт состояния.
concurrency:
  group: telegram-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Run monitor bot
      env:
        # Секретные данные
        TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
        TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        SESSION_STRING: ${{ secrets.SESSION_STRING }}
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        YOUR_USER_ID: ${{ secrets.YOUR_USER_ID }}
        # Обычные переменные (видимые)
        CHANNELS: ${{ vars.CHANNELS }}
        KEYWORDS: ${{ vars.KEYWORDS }}
        EXCLUDE_KEYWORDS: ${{ vars.EXCLUDE_KEYWORDS }}
        PATTERNS: ${{ vars.PATTERNS }}
        SEARCH_DEPTH: ${{ vars.SEARCH_DEPTH || '100' }}
        TIME_RANGE_HOURS: ${{ vars.TIME_RANGE_HOURS || '24' }}
      run: |
        python telegram_monitor.py
    
    - name: Commit processed messages
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add processed_messages.json
        if git diff --staged --quiet; then
          echo "Нет изменений — коммит не требуется"
          exit 0
        fi
        git commit -m "Update processed messages [skip ci]"
        # Push с ретраями и rebase на случай, если remote ушёл вперёд
        for attempt in 1 2 3 4; do
          if git push; then
            echo "Push успешен (попытка $attempt)"
            exit 0
          fi
          echo "Push не удался (попытка $attempt), пробую rebase..."
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          sleep $((2 ** attempt))
        done
        echo "❌ Push не удался после нескольких попыток"
        exit 1
